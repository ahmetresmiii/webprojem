<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linguix - Linux Öğren</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.1.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.1.0/lib/xterm.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .xterm-viewport { overflow-y: auto !important; }
    </style>
</head>
<body class="bg-white text-slate-900 min-h-screen">

    <!-- Giriş Ekranı -->
    <div id="auth-screen" class="fixed inset-0 bg-white z-[200] flex items-center justify-center p-6">
        <div class="max-w-md w-full border border-slate-100 shadow-2xl rounded-[2.5rem] p-10 text-center">
            <h1 class="text-4xl font-black italic mb-2">LINGUIX<span class="text-green-500">.</span></h1>
            <p class="text-slate-400 font-bold mb-8 text-sm uppercase tracking-widest">Linux öğrenmenin en temiz yolu</p>
            
            <div class="space-y-4">
                <button id="google-login" class="w-full flex items-center justify-center gap-3 border border-slate-200 py-4 rounded-2xl font-bold hover:bg-slate-50 transition-all">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-5" alt="Google">
                    Google ile Devam Et
                </button>
                <div class="relative py-2">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-100"></div></div>
                    <span class="relative bg-white px-4 text-xs font-bold text-slate-300 uppercase">Veya</span>
                </div>
                <button id="anon-login" class="w-full py-4 rounded-2xl font-bold text-slate-400 hover:text-slate-600 transition-all text-sm">
                    Kayıt olmadan dene
                </button>
            </div>
        </div>
    </div>

    <!-- Ana Uygulama -->
    <div id="app-content" class="hidden h-screen flex flex-col">
        <nav class="h-16 border-b border-slate-100 px-8 flex items-center justify-between">
            <span class="text-2xl font-black italic">LINGUIX<span class="text-green-500">.</span></span>
            <div class="flex items-center gap-4">
                <div class="bg-slate-50 px-4 py-1.5 rounded-full font-bold text-sm flex items-center gap-2">
                    💎 <span id="xp-val">0</span> XP
                </div>
                <button id="logout-btn" class="text-slate-300 hover:text-red-500 transition-colors">Çıkış</button>
            </div>
        </nav>

        <main class="flex-1 flex flex-col md:flex-row overflow-hidden">
            <!-- Sol Panel: Ders -->
            <div class="w-full md:w-1/2 p-10 overflow-y-auto">
                <div class="max-w-lg">
                    <p id="lesson-index" class="text-xs font-black text-slate-300 uppercase mb-2">Ders 1 / 160</p>
                    <h2 id="task-title" class="text-3xl font-black mb-8 leading-tight">Yükleniyor...</h2>
                    
                    <div id="info-section" class="space-y-6">
                        <div class="bg-slate-50 rounded-[2rem] p-8 border border-slate-100">
                            <p id="task-instruction" class="text-lg font-medium text-slate-600 leading-relaxed"></p>
                        </div>
                        <button id="start-task-btn" class="bg-slate-900 text-white px-10 py-4 rounded-2xl font-bold hover:bg-black transition-all">Anladım, Uygulayalım</button>
                    </div>

                    <div id="task-section" class="hidden space-y-6">
                        <div class="bg-green-50 rounded-[2rem] p-8 border border-green-100">
                            <h4 class="font-black text-green-700 mb-2 uppercase text-xs tracking-widest">Senin Görevin:</h4>
                            <p id="task-goal" class="text-green-900 font-bold text-lg"></p>
                        </div>
                        <div id="error-box" class="hidden bg-red-50 border border-red-100 p-6 rounded-2xl text-red-700 text-sm font-bold"></div>
                    </div>
                </div>
            </div>

            <!-- Sağ Panel: Terminal -->
            <div class="flex-1 bg-slate-50 p-6 md:p-10 flex flex-col">
                <div id="terminal-container" class="flex-1 bg-white rounded-[2.5rem] shadow-xl border border-slate-200 overflow-hidden flex flex-col">
                    <div class="h-10 border-b border-slate-100 flex items-center px-6 gap-2">
                        <div class="w-2.5 h-2.5 rounded-full bg-slate-200"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-slate-200"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-slate-200"></div>
                    </div>
                    <div id="terminal-host" class="flex-1 p-6"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Başarı Modal -->
    <div id="win-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-[300] hidden items-center justify-center p-6">
        <div class="bg-white rounded-[3rem] p-12 max-w-sm w-full text-center shadow-2xl">
            <div class="text-6xl mb-6">🎯</div>
            <h2 class="text-3xl font-black mb-2 italic">HARİKA!</h2>
            <p class="text-slate-400 font-bold mb-8">Linux uzmanlığına bir adım daha yaklaştın.</p>
            <button id="next-lesson-btn" class="w-full bg-green-500 text-white font-black py-5 rounded-2xl hover:bg-green-600 transition-all uppercase tracking-widest">Sonraki Ders</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, GoogleAuthProvider, signInWithPopup, signInWithRedirect, onAuthStateChanged, signOut, getRedirectResult } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCU770IpyRi5xYKYKZjkKEXKyaWNg1lTy8",
            authDomain: "linuxing-578c5.firebaseapp.com",
            projectId: "linuxing-578c5",
            storageBucket: "linuxing-578c5.firebasestorage.app",
            messagingSenderId: "838982298549",
            appId: "1:838982298549:web:5c83c0044d8fbe5cfa47fc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "linguix-pro-160";

        const curriculum = [
            { id: 1, title: "Neredeyim Ben? (pwd)", info: "Linux'ta terminali açtığında aslında bir klasörün içindesindir. Hangi klasörde olduğunu unutursan 'pwd' (Print Working Directory) imdadına yetişir.", goal: "Bulunduğun dizini yazdırmak için terminale 'pwd' yaz.", cmd: "pwd", out: "/home/user", err: "Küçük harflerle 'pwd' yazıp Enter'a basmalısın." },
            { id: 2, title: "Etrafına Bak (ls)", info: "Klasörün içinde neler olduğunu görmek için 'ls' (List) komutunu kullanırız. Bu, o anki dizindeki dosya ve klasörleri listeler.", goal: "Dosyaları listelemek için 'ls' yaz.", cmd: "ls", out: "belgeler  indirilenler  resimler", err: "Sadece 'ls' yazman yeterli." }
        ];

        let userState = { xp: 0, level: 1 };
        let term, currentInput = "";

        // Auth Logic
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                await syncData(user.uid);
                initTerminal();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-content').classList.add('hidden');
            }
        });

        async function syncData(uid) {
            const ref = doc(db, 'artifacts', appId, 'users', uid, 'profile', 'progress');
            const snap = await getDoc(ref);
            if(snap.exists()) {
                userState = snap.data();
                updateUI();
            } else {
                await setDoc(ref, userState);
                updateUI();
            }
        }

        function updateUI() {
            const lesson = curriculum[userState.level - 1] || curriculum[0];
            document.getElementById('lesson-index').innerText = `Ders ${userState.level} / 160`;
            document.getElementById('task-title').innerText = lesson.title;
            document.getElementById('task-instruction').innerText = lesson.info;
            document.getElementById('task-goal').innerText = lesson.goal;
            document.getElementById('xp-val').innerText = userState.xp;
            
            document.getElementById('info-section').classList.remove('hidden');
            document.getElementById('task-section').classList.add('hidden');
        }

        function initTerminal() {
            if (term) return;
            term = new window.Terminal({
                cursorBlink: true,
                fontSize: 16,
                theme: { background: '#ffffff', foreground: '#1e293b', cursor: '#22c55e' },
                fontFamily: 'monospace'
            });
            term.open(document.getElementById('terminal-host'));
            term.write('\x1b[32muser@linguix:~\x1b[0m$ ');

            term.onData(data => {
                if (data === '\r') {
                    processCommand(currentInput.trim());
                    currentInput = "";
                } else if (data === '\u007F') {
                    if (currentInput.length > 0) {
                        currentInput = currentInput.slice(0, -1);
                        term.write('\b \b');
                    }
                } else {
                    currentInput += data;
                    term.write(data);
                }
            });
        }

        function processCommand(cmd) {
            const lesson = curriculum[userState.level - 1];
            term.write('\r\n');
            if (cmd.toLowerCase() === lesson.cmd) {
                term.write(lesson.out + '\r\n\x1b[32m[OK] Başarılı!\x1b[0m\r\n');
                document.getElementById('win-modal').classList.remove('hidden');
                document.getElementById('win-modal').classList.add('flex');
            } else {
                term.write('\x1b[31mHata: Komut yanlış.\x1b[0m\r\n\x1b[32muser@linguix:~\x1b[0m$ ');
                document.getElementById('error-box').innerText = lesson.err;
                document.getElementById('error-box').classList.remove('hidden');
            }
        }

        // Events
        document.getElementById('start-task-btn').onclick = () => {
            document.getElementById('info-section').classList.add('hidden');
            document.getElementById('task-section').classList.remove('hidden');
        };

        document.getElementById('next-lesson-btn').onclick = async () => {
            userState.level++;
            userState.xp += 10;
            await setDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'profile', 'progress'), userState);
            document.getElementById('win-modal').classList.add('hidden');
            document.getElementById('win-modal').classList.remove('flex');
            updateUI();
            term.clear();
            term.write('\x1b[32muser@linguix:~\x1b[0m$ ');
        };

        document.getElementById('google-login').onclick = async () => {
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
            } catch {
                await signInWithRedirect(auth, provider);
            }
        };

        document.getElementById('anon-login').onclick = () => signInAnonymously(auth);
        document.getElementById('logout-btn').onclick = () => signOut(auth);

        // Redirect result for mobile
        getRedirectResult(auth).catch(e => console.error(e));

    </script>
</body>
</html>
