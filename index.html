<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Linguix | Linux Mastery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.1.0/css/xterm.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
        .terminal-shadow { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); }
        .gradient-text { background: linear-gradient(135deg, #22c55e 0%, #3b82f6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .xterm-viewport { overflow-y: auto !important; border-radius: 0 0 1.5rem 1.5rem; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <!-- Auth Section -->
    <div id="auth-layer" class="fixed inset-0 bg-white z-[999] flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-white border border-slate-100 shadow-[0_32px_64px_-15px_rgba(0,0,0,0.1)] rounded-[3rem] p-12 text-center">
            <div class="w-20 h-20 bg-green-50 rounded-3xl flex items-center justify-center mx-auto mb-8 rotate-3">
                <span class="text-4xl">🐧</span>
            </div>
            <h1 class="text-4xl font-black italic mb-2 tracking-tighter italic">LINGUIX<span class="text-green-500">.</span></h1>
            <p class="text-slate-400 font-bold mb-10 text-[10px] uppercase tracking-[0.3em]">Bilişimde Uzmanlaşmanın Yolu</p>
            
            <div class="space-y-4">
                <button id="btn-google" class="w-full flex items-center justify-center gap-3 bg-white border-2 border-slate-100 py-4 rounded-2xl font-bold hover:border-green-500 hover:bg-green-50 transition-all active:scale-[0.98]">
                    <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    Google Hesabı ile Gir
                </button>
                <button id="btn-anon" class="w-full py-4 text-slate-400 font-bold text-xs hover:text-green-600 transition-all uppercase tracking-widest">
                    Misafir Olarak Başla
                </button>
            </div>
            
            <div id="error-toast" class="hidden mt-6 p-3 bg-red-50 text-red-600 text-[10px] font-bold rounded-xl border border-red-100">
                Lütfen Render adresini Firebase paneline ekleyin!
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="main-app" class="hidden h-screen flex flex-col">
        <header class="h-20 glass border-b border-slate-200/50 px-10 flex items-center justify-between shrink-0 z-50">
            <div class="flex items-center gap-2">
                <span class="text-2xl font-black italic tracking-tighter">LINGUIX<span class="text-green-500">.</span></span>
            </div>
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-3">
                    <div class="flex -space-x-2">
                        <div class="w-8 h-8 rounded-full bg-blue-500 border-2 border-white"></div>
                        <div class="w-8 h-8 rounded-full bg-green-500 border-2 border-white"></div>
                    </div>
                    <span class="text-xs font-black text-slate-400">AKTİF ÖĞRENCİLER</span>
                </div>
                <div class="h-8 w-px bg-slate-200"></div>
                <div class="flex items-center gap-2 bg-slate-900 text-white px-5 py-2 rounded-2xl shadow-xl shadow-green-500/20 transition-all">
                    <span class="text-lg">💎</span>
                    <span id="xp-display" class="font-black text-sm tabular-nums">0</span>
                    <span class="text-[10px] font-bold text-green-400">XP</span>
                </div>
                <button id="btn-logout" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-red-50 text-slate-400 hover:text-red-500 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </header>

        <div class="flex-1 flex flex-col md:flex-row overflow-hidden">
            <!-- Content -->
            <div class="w-full md:w-5/12 p-8 md:p-16 overflow-y-auto bg-white relative">
                <div class="max-w-xl mx-auto">
                    <div class="flex items-center gap-3 mb-6">
                        <span id="lesson-badge" class="px-3 py-1 rounded-lg bg-green-500 text-white text-[10px] font-black uppercase tracking-widest shadow-lg shadow-green-500/30">Ders 1</span>
                        <div class="flex-1 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                            <div id="progress-bar" class="h-full bg-green-500 transition-all duration-1000" style="width: 5%"></div>
                        </div>
                    </div>
                    
                    <h2 id="lesson-title" class="text-4xl font-black text-slate-900 mb-8 leading-[1.1] tracking-tight tracking-tight">Eğitim Yükleniyor...</h2>
                    
                    <div id="panel-info" class="space-y-8 animate-in slide-in-from-bottom-4 duration-700">
                        <div class="p-8 rounded-[2.5rem] bg-slate-50 border border-slate-100 relative overflow-hidden group">
                            <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:scale-110 transition-transform">
                                <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                            </div>
                            <p id="lesson-text" class="text-xl font-medium text-slate-600 leading-relaxed relative z-10"></p>
                        </div>
                        <button id="btn-start" class="group w-full bg-slate-900 text-white px-10 py-6 rounded-[2rem] font-black text-lg hover:bg-black hover:shadow-2xl hover:shadow-blue-500/20 hover:-translate-y-1 transition-all flex items-center justify-center gap-3">
                            Anladım, Uygulayalım <svg class="group-hover:translate-x-1 transition-transform" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                        </button>
                    </div>

                    <div id="panel-task" class="hidden space-y-6 animate-in fade-in duration-500">
                        <div class="bg-gradient-to-br from-slate-900 to-slate-800 rounded-[2.5rem] p-10 text-white shadow-2xl relative overflow-hidden">
                            <div class="absolute -right-4 -bottom-4 opacity-10 rotate-12 uppercase font-black text-6xl select-none italic">TASK</div>
                            <span class="text-[10px] font-black text-green-400 uppercase tracking-[0.3em] block mb-4">Günün Görevi</span>
                            <p id="lesson-goal" class="text-2xl font-bold leading-tight"></p>
                        </div>
                        <div id="error-alert" class="hidden bg-red-50 border-2 border-red-100 p-6 rounded-3xl text-red-600 font-bold text-sm flex items-center gap-4">
                            <span class="text-2xl">⚠️</span>
                            <span id="error-text"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Terminal -->
            <div class="flex-1 p-6 md:p-12 flex flex-col justify-center">
                <div class="w-full h-full max-h-[600px] flex flex-col bg-white rounded-[3rem] shadow-[0_40px_80px_-20px_rgba(0,0,0,0.12)] border border-slate-200 overflow-hidden terminal-shadow transition-all duration-500 group">
                    <div class="h-14 bg-slate-50/50 flex items-center px-8 gap-3 border-b border-slate-100">
                        <div class="flex gap-2">
                            <div class="w-3.5 h-3.5 rounded-full bg-red-400/80"></div>
                            <div class="w-3.5 h-3.5 rounded-full bg-yellow-400/80"></div>
                            <div class="w-3.5 h-3.5 rounded-full bg-green-400/80"></div>
                        </div>
                        <div class="flex-1 text-center pr-10">
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-[0.4em]">LINUX_EMULATOR_PRO_V2</span>
                        </div>
                    </div>
                    <div id="terminal" class="flex-1 p-6 bg-white overflow-hidden"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="success-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-xl z-[1000] hidden items-center justify-center p-6">
        <div class="bg-white rounded-[4rem] p-12 max-w-sm w-full text-center shadow-2xl border border-white/20 animate-in zoom-in-95 duration-300">
            <div class="w-24 h-24 bg-gradient-to-tr from-green-400 to-emerald-600 text-white rounded-[2rem] flex items-center justify-center mx-auto mb-8 shadow-2xl shadow-green-500/40 text-4xl transform -rotate-6">🏆</div>
            <h2 class="text-4xl font-black mb-2 italic tracking-tight italic">MÜKEMMEL!</h2>
            <p class="text-slate-400 font-bold mb-10 text-sm px-4 leading-relaxed">Harika ilerliyorsun. Bir sonraki aşamaya geçmeye hazır mısın?</p>
            <button id="btn-next" class="group w-full bg-slate-900 text-white font-black py-6 rounded-[2rem] hover:bg-black transition-all shadow-xl shadow-slate-200 uppercase tracking-widest text-xs flex items-center justify-center gap-3">
                DEVAM ET <svg class="group-hover:translate-x-1 transition-transform" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.1.0/lib/xterm.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, GoogleAuthProvider, signInWithPopup, signInWithRedirect, onAuthStateChanged, signOut, getRedirectResult } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCU770IpyRi5xYKYKZjkKEXKyaWNg1lTy8",
            authDomain: "linuxing-578c5.firebaseapp.com",
            projectId: "linuxing-578c5",
            storageBucket: "linuxing-578c5.firebasestorage.app",
            messagingSenderId: "838982298549",
            appId: "1:838982298549:web:5c83c0044d8fbe5cfa47fc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const APP_VERSION = "linguix-master-v2";

        const lessons = [
            { id: 1, title: "Neredeyim Ben?", text: "Linux terminali devasa bir kütüphane gibidir. 'pwd' (Print Working Directory) komutu, o an hangi rafta olduğunu gösterir.", goal: "Bulunduğun tam adresi görmek için terminale 'pwd' yaz ve Enter'a bas.", cmd: "pwd", response: "/home/bilişim_uzmanı/linguix" },
            { id: 2, title: "Etrafı Keşfet", text: "Bulunduğun klasörde neler olduğunu görmek için 'ls' (List) komutunu kullanırız. Karanlıkta fener yakmak gibidir!", goal: "Klasördeki gizli olmayan dosyaları listelemek için 'ls' yaz.", cmd: "ls", response: "belgeler/  notlar.txt  projem/  sunucu_ayarları.conf" }
        ];

        let state = { xp: 0, level: 1 };
        let xterm, inputBuffer = "";

        // UI Helpers
        const showToast = (msg) => {
            const t = document.getElementById('error-toast');
            t.innerText = msg;
            t.classList.remove('hidden');
        };

        // Auth
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('auth-layer').style.display = 'none';
                document.getElementById('main-app').classList.remove('hidden');
                await loadUserData(user.uid);
                setupTerminal();
            } else {
                document.getElementById('auth-layer').style.display = 'flex';
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        async function loadUserData(uid) {
            const docRef = doc(db, 'artifacts', APP_VERSION, 'users', uid, 'profile', 'progress');
            try {
                const snap = await getDoc(docRef);
                if (snap.exists()) state = snap.data();
                else await setDoc(docRef, state);
                renderUI();
            } catch(e) { console.error(e); }
        }

        function renderUI() {
            const current = lessons[state.level - 1] || lessons[0];
            document.getElementById('lesson-badge').innerText = `Ders ${state.level}`;
            document.getElementById('lesson-title').innerText = current.title;
            document.getElementById('lesson-text').innerText = current.text;
            document.getElementById('lesson-goal').innerText = current.goal;
            document.getElementById('xp-display').innerText = state.xp;
            document.getElementById('progress-bar').style.width = `${(state.level / 160) * 100}%`;
            
            document.getElementById('panel-info').classList.remove('hidden');
            document.getElementById('panel-task').classList.add('hidden');
            document.getElementById('error-alert').classList.add('hidden');
        }

        function setupTerminal() {
            if (xterm) return;
            xterm = new Terminal({
                cursorBlink: true,
                fontSize: 16,
                theme: { background: '#ffffff', foreground: '#1e293b', cursor: '#22c55e', selection: '#dcfce7' },
                fontFamily: '"Plus Jakarta Sans", monospace',
                letterSpacing: 0.5
            });
            xterm.open(document.getElementById('terminal'));
            prompt();

            xterm.onData(data => {
                if (data === '\r') {
                    handleCmd(inputBuffer.trim());
                    inputBuffer = "";
                } else if (data === '\u007F') {
                    if (inputBuffer.length > 0) {
                        inputBuffer = inputBuffer.slice(0, -1);
                        xterm.write('\b \b');
                    }
                } else {
                    inputBuffer += data;
                    xterm.write(data);
                }
            });
        }

        function prompt() { xterm.write('\r\n\x1b[38;5;46m➜\x1b[0m \x1b[38;5;75m~/linguix\x1b[0m '); }

        function handleCmd(raw) {
            const current = lessons[state.level - 1];
            xterm.write('\r\n');
            if (raw.toLowerCase() === current.cmd) {
                xterm.writeln('\x1b[38;5;250m' + current.response + '\x1b[0m');
                xterm.writeln('\x1b[38;5;46m[BAŞARILI] Komut doğru çalıştırıldı.\x1b[0m');
                document.getElementById('success-modal').style.display = 'flex';
            } else {
                xterm.writeln(`\x1b[31mHata: '${raw}' komutu geçersiz veya bu ders için uygun değil.\x1b[0m`);
                document.getElementById('error-text').innerText = "Yanlış komut girdin. '" + current.cmd + "' yazıp Enter'a basmalısın.";
                document.getElementById('error-alert').classList.remove('hidden');
                prompt();
            }
        }

        // Actions
        document.getElementById('btn-start').onclick = () => {
            document.getElementById('panel-info').classList.add('hidden');
            document.getElementById('panel-task').classList.remove('hidden');
        };

        document.getElementById('btn-next').onclick = async () => {
            state.level++;
            state.xp += 25;
            await setDoc(doc(db, 'artifacts', APP_VERSION, 'users', auth.currentUser.uid, 'profile', 'progress'), state);
            document.getElementById('success-modal').style.display = 'none';
            renderUI();
            xterm.clear();
            prompt();
        };

        document.getElementById('btn-google').onclick = async () => {
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
            } catch (e) {
                if (e.code === 'auth/unauthorized-domain') {
                    showToast("Bu adres (domain) Firebase'de yetkilendirilmemiş! Lütfen Console'dan ekleyin.");
                } else {
                    await signInWithRedirect(auth, provider);
                }
            }
        };

        document.getElementById('btn-anon').onclick = () => signInAnonymously(auth);
        document.getElementById('btn-logout').onclick = () => signOut(auth);

        getRedirectResult(auth).catch(e => {
            if (e.code === 'auth/unauthorized-domain') showToast("Yetkisiz domain! Firebase panelinden Render adresini ekleyin.");
        });

    </script>
</body>
</html>
