<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Linguix | Linux Mastery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.1.0/css/xterm.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0f172a;
            color: #f1f5f9;
            overflow: hidden;
        }
        .glass-dark { 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .terminal-container {
            background: #000;
            border-radius: 1.5rem;
            box-shadow: 0 0 40px rgba(34, 197, 94, 0.1);
        }
        .xterm-viewport { border-radius: 0 0 1.5rem 1.5rem; }
        .xterm-main-slot { padding: 12px; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">

    <audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="snd-success" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>
    <audio id="snd-error" src="https://assets.mixkit.co/active_storage/sfx/253/253-preview.mp3"></audio>

    <!-- Auth Layer -->
    <div id="auth-layer" class="fixed inset-0 bg-slate-950 z-[999] flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-slate-900 border border-slate-800 shadow-2xl rounded-[3rem] p-10 text-center relative overflow-hidden">
            <div class="absolute -top-24 -left-24 w-48 h-48 bg-green-500/10 blur-[100px]"></div>
            <div class="w-20 h-20 bg-green-500/10 rounded-3xl flex items-center justify-center mx-auto mb-6 rotate-3 border border-green-500/20">
                <span class="text-4xl">🐧</span>
            </div>
            <h1 class="text-4xl font-black italic mb-2 tracking-tighter text-white">LINGUIX<span class="text-green-500">.</span></h1>
            <p class="text-slate-500 font-bold mb-8 text-[10px] uppercase tracking-[0.3em]">Linux Terminal Mastery</p>
            <div class="space-y-4 relative z-10">
                <button id="btn-google" class="w-full flex items-center justify-center gap-3 bg-white text-slate-900 py-4 rounded-2xl font-black hover:bg-slate-100 transition-all active:scale-[0.98]">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    Google Hesabı ile Gir
                </button>
                <button id="btn-anon" class="w-full py-4 text-slate-400 font-bold text-xs hover:text-green-500 transition-all uppercase tracking-widest">
                    Misafir Olarak Devam Et
                </button>
            </div>
            <div id="error-toast" class="hidden mt-6 p-4 bg-red-500/10 text-red-400 text-[11px] font-bold rounded-2xl border border-red-500/20 leading-tight"></div>
        </div>
    </div>

    <!-- Main App -->
    <div id="main-app" class="hidden h-screen flex flex-col">
        <header class="h-20 glass-dark border-b border-white/5 px-6 md:px-10 flex items-center justify-between shrink-0 z-50">
            <div class="flex items-center gap-2">
                <span class="text-2xl font-black italic tracking-tighter text-white">LINGUIX<span class="text-green-500">.</span></span>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 bg-green-500/10 border border-green-500/20 text-green-400 px-4 py-2 rounded-2xl">
                    <span id="xp-display" class="font-black text-sm tabular-nums">0</span>
                    <span class="text-[10px] font-bold opacity-70">XP</span>
                </div>
                <button id="btn-logout" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-red-500/20 text-slate-500 hover:text-red-400 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </header>

        <div class="flex-1 flex flex-col lg:flex-row overflow-hidden">
            <!-- Left Panel -->
            <div class="w-full lg:w-[50%] p-6 md:p-12 lg:p-16 overflow-y-auto bg-slate-900 border-r border-white/5 shadow-2xl z-10">
                <div class="max-w-xl mx-auto space-y-12">
                    <div class="flex items-center gap-4">
                        <span id="lesson-badge" class="px-4 py-1.5 rounded-xl bg-green-500 text-slate-950 text-xs font-black uppercase tracking-widest">Ders 1</span>
                        <div class="flex-1 h-2.5 bg-slate-800 rounded-full overflow-hidden border border-white/5">
                            <div id="progress-bar" class="h-full bg-green-500 transition-all duration-1000" style="width: 5%"></div>
                        </div>
                    </div>
                    
                    <h2 id="lesson-title" class="text-4xl md:text-5xl font-black text-white leading-tight tracking-tighter">Ders Yükleniyor...</h2>
                    
                    <div id="panel-info" class="space-y-8 animate-in slide-in-from-bottom-8 duration-500">
                        <div class="p-8 rounded-[2.5rem] bg-slate-800/40 border border-white/10 shadow-inner">
                            <p id="lesson-text" class="text-xl md:text-2xl font-semibold text-slate-200 leading-relaxed"></p>
                        </div>
                        <button id="btn-start" class="w-full bg-green-500 text-slate-950 px-8 py-6 rounded-[2rem] font-black text-xl hover:bg-green-400 active:scale-95 transition-all flex items-center justify-center gap-4">
                            BAŞLA <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                        </button>
                    </div>

                    <div id="panel-task" class="hidden space-y-8">
                        <div class="bg-gradient-to-br from-green-600 to-emerald-700 rounded-[2.5rem] p-10 text-slate-950 shadow-2xl">
                            <span class="text-xs font-black uppercase tracking-[0.4em] block mb-3 opacity-80">TALİMAT</span>
                            <p id="lesson-goal" class="text-2xl md:text-3xl font-black leading-tight"></p>
                        </div>
                        <div id="error-alert" class="hidden bg-red-500/10 border border-red-500/20 p-6 rounded-3xl text-red-400 font-bold text-base flex items-center gap-4">
                            <span class="text-2xl">⚠️</span>
                            <span id="error-text"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Panel -->
            <div class="w-full lg:w-[50%] p-6 md:p-12 flex flex-col justify-center bg-slate-950">
                <div class="w-full h-full max-h-[600px] flex flex-col terminal-container overflow-hidden group border border-white/5">
                    <div class="h-14 bg-slate-900/80 flex items-center px-8 gap-3 border-b border-white/5">
                        <div class="flex gap-2">
                            <div class="w-3 h-3 rounded-full bg-red-500/30"></div>
                            <div class="w-3 h-3 rounded-full bg-yellow-500/30"></div>
                            <div class="w-3 h-3 rounded-full bg-green-500/30"></div>
                        </div>
                        <div class="flex-1 text-center pr-10">
                            <span class="text-[9px] font-black text-slate-500 uppercase tracking-[0.6em]">LINGUIX_SHELL_V3.0</span>
                        </div>
                    </div>
                    <div id="terminal" class="flex-1 bg-black"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="success-modal" class="fixed inset-0 bg-slate-950/95 backdrop-blur-xl z-[1000] hidden items-center justify-center p-6">
        <div class="bg-slate-900 rounded-[4rem] p-12 max-w-sm w-full text-center border border-white/10 shadow-2xl">
            <div class="w-24 h-24 bg-green-500 text-slate-950 rounded-[2.5rem] flex items-center justify-center mx-auto mb-8 shadow-2xl shadow-green-500/30 text-4xl">🎉</div>
            <h2 class="text-4xl font-black text-white mb-3 italic">BAŞARILI!</h2>
            <p class="text-slate-400 font-bold mb-10 text-base leading-relaxed">Sistem bilgilerin doğrulandı. Bir sonraki aşamaya hazırsın.</p>
            <button id="btn-next" class="w-full bg-white text-slate-950 font-black py-6 rounded-[2rem] hover:bg-green-500 transition-all uppercase tracking-widest text-sm shadow-xl">İLERLE</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.1.0/lib/xterm.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCU770IpyRi5xYKYKZjkKEXKyaWNg1lTy8",
            authDomain: "linuxing-578c5.firebaseapp.com",
            projectId: "linuxing-578c5",
            storageBucket: "linuxing-578c5.firebasestorage.app",
            messagingSenderId: "838982298549",
            appId: "1:838982298549:web:5c83c0044d8fbe5cfa47fc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const APP_VERSION = "linguix-master-v3";

        const lessons = [
            { id: 1, title: "Neredeyim Ben?", text: "Linux terminalinde kaybolduğunda 'pwd' (Print Working Directory) imdadına yetişir. O an tam olarak hangi klasörün içinde olduğunu gösterir.", goal: "Bulunduğun klasörü görmek için terminale 'pwd' yazıp Enter'la.", cmd: "pwd", response: "/home/uzman/linguix" },
            { id: 2, title: "İçerikleri Gör", text: "Bulunduğun yerdeki dosyaları ve klasörleri listelemek için 'ls' komutunu kullanırız. Karanlık bir odada ışığı açmak gibidir.", goal: "Dosyaları listelemek için 'ls' komutunu çalıştır.", cmd: "ls", response: "belgeler/  notlar.txt  projem/  ayarlar.cfg" }
        ];

        let state = { xp: 0, level: 1 };
        let xterm, inputBuffer = "";

        const showError = (msg) => {
            const toast = document.getElementById('error-toast');
            toast.innerText = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 8000);
        };

        getRedirectResult(auth).catch((error) => {
            showError("Giriş başarısız: " + error.message);
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('auth-layer').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                await loadUserData(user.uid);
                setupTerminal();
            } else {
                document.getElementById('auth-layer').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        async function loadUserData(uid) {
            const docRef = doc(db, 'artifacts', APP_VERSION, 'users', uid, 'profile', 'progress');
            try {
                const snap = await getDoc(docRef);
                if (snap.exists()) state = snap.data();
                else await setDoc(docRef, state);
                renderUI();
            } catch(e) { console.error(e); }
        }

        function renderUI() {
            const current = lessons[state.level - 1] || lessons[0];
            document.getElementById('lesson-badge').innerText = `Ders ${state.level}`;
            document.getElementById('lesson-title').innerText = current.title;
            document.getElementById('lesson-text').innerText = current.text;
            document.getElementById('lesson-goal').innerText = current.goal;
            document.getElementById('xp-display').innerText = state.xp;
            document.getElementById('progress-bar').style.width = `${(state.level / 10) * 100}%`;
            
            document.getElementById('panel-info').classList.remove('hidden');
            document.getElementById('panel-task').classList.add('hidden');
            document.getElementById('error-alert').classList.add('hidden');
        }

        function setupTerminal() {
            if (xterm) return;
            xterm = new Terminal({
                cursorBlink: true,
                fontSize: 18,
                theme: { background: '#000000', foreground: '#22c55e', cursor: '#22c55e' },
                fontFamily: '"Plus Jakarta Sans", monospace'
            });
            xterm.open(document.getElementById('terminal'));
            xterm.focus(); // Terminale otomatik odaklan
            prompt();

            xterm.onData(data => {
                if (data === '\r') {
                    handleCmd(inputBuffer.trim());
                    inputBuffer = "";
                } else if (data === '\u007F') { // Backspace
                    if (inputBuffer.length > 0) {
                        inputBuffer = inputBuffer.slice(0, -1);
                        xterm.write('\b \b');
                    }
                } else {
                    inputBuffer += data;
                    xterm.write(data);
                }
            });
        }

        function prompt() { xterm.write('\r\n\x1b[32m➜\x1b[0m \x1b[36m~/linguix\x1b[0m $ '); }

        function handleCmd(raw) {
            const current = lessons[state.level - 1];
            xterm.write('\r\n');
            
            if (!raw) {
                prompt();
                return;
            }

            if (raw.toLowerCase() === current.cmd) {
                document.getElementById('snd-success').play().catch(()=>{});
                xterm.writeln(current.response);
                document.getElementById('success-modal').style.display = 'flex';
            } else {
                document.getElementById('snd-error').play().catch(()=>{});
                xterm.writeln(`\x1b[31mHATA: '${raw}' yanlış komut.\x1b[0m`);
                document.getElementById('error-text').innerText = `Görevi tamamlamak için '${current.cmd}' yazmalısın.`;
                document.getElementById('error-alert').classList.remove('hidden');
                prompt();
            }
        }

        document.getElementById('btn-google').onclick = async () => {
            const provider = new GoogleAuthProvider();
            try { 
                await signInWithPopup(auth, provider); 
            } catch (e) {
                if (e.code === 'auth/popup-blocked') {
                    await signInWithRedirect(auth, provider);
                } else {
                    showError("Hata: " + e.message);
                }
            }
        };

        document.getElementById('btn-start').onclick = () => {
            document.getElementById('snd-click').play().catch(()=>{});
            document.getElementById('panel-info').classList.add('hidden');
            document.getElementById('panel-task').classList.remove('hidden');
            if(xterm) xterm.focus();
        };

        document.getElementById('btn-next').onclick = async () => {
            state.level++;
            state.xp += 25;
            await setDoc(doc(db, 'artifacts', APP_VERSION, 'users', auth.currentUser.uid, 'profile', 'progress'), state);
            document.getElementById('success-modal').style.display = 'none';
            renderUI();
            xterm.clear();
            prompt();
            xterm.focus();
        };

        document.getElementById('btn-logout').onclick = () => signOut(auth);
        document.getElementById('btn-anon').onclick = () => signInAnonymously(auth);

    </script>
</body>
</html>
